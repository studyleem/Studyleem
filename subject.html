<body>
    <div class="header">
        <div class="container">
            <div class="breadcrumb" id="breadcrumb">
                <a href="/home">Home</a> / <a href="/class?class=12">Class 12</a> / Subject
            </div>
            <h1 id="pageTitle">📚 Subject Materials</h1>
            <p>Federal Board (FBISE)</p>
        </div>
    </div>
    
    <div class="loading" id="loading">Loading materials...</div>
    
    <div class="container" id="content" style="display: none;">
        <div class="books-section" id="booksSection"></div>
        <div class="notes-section">
            <h2>📝 Chapter-wise Notes</h2>
            <div id="chaptersContainer"></div>
        </div>
    </div>

        </p>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Main JS -->
    <script src="/main.js"></script>
    
    <script>
        // Get class and subject from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const classNum = urlParams.get('class') || '12';
        const subjectName = urlParams.get('subject') || 'Biology';
        
        // Update page
        document.getElementById('pageTitle').textContent = `📚 Class ${classNum} ${subjectName}`;
        document.getElementById('breadcrumb').innerHTML = `
            <a href="/home">Home</a> / <a href="/class?class=${classNum}">Class ${classNum}</a> / ${subjectName}
        `;
        document.title = `Class ${classNum} ${subjectName} - FBISE | StudyLeem`;
        
        // Load materials
        async function loadMaterials() {
            try {
                const snapshot = await db.collection('materials')
                    .where('class', '==', classNum)
                    .where('subject', '==', subjectName)
                    .get();
                
                const books = [];
                const notes = [];
                
                snapshot.docs.forEach(doc => {
                    const data = { id: doc.id, ...doc.data() };
                    if (data.type === 'books') books.push(data);
                    if (data.type === 'notes') notes.push(data);
                });
                
                displayBooks(books);
                displayNotes(notes);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').textContent = 'Error loading materials';
            }
        }
        
        function displayBooks(books) {
            const section = document.getElementById('booksSection');
            if (books.length === 0) {
                section.style.display = 'none';
                return;
            }
            
            section.innerHTML = '<h2>📖 Books</h2>';
            books.forEach(book => {
                const div = document.createElement('div');
                div.className = 'book-item';
                div.innerHTML = `
                    <div>
                        <strong>${book.title}</strong>
                        <div style="font-size: 0.9rem; color: #64748b; margin-top: 0.25rem;">PDF Format</div>
                    </div>
                    <a href="${book.pdfUrl}" target="_blank" class="book-btn">📥 Download</a>
                `;
                section.appendChild(div);
            });
        }
        
        function displayNotes(notes) {
            const container = document.getElementById('chaptersContainer');
            
            if (notes.length === 0) {
                container.innerHTML = '<p style="color: #64748b; padding: 1rem;">No chapter notes available yet.</p>';
                return;
            }
            
            // Group by chapter
            const chapters = {};
            notes.forEach(note => {
                const match = note.title.match(/(?:chapter|ch\.?)\s*(\d+)|^(\d+)[\.\:\-\s]/i);
                const chNum = match ? (match[1] || match[2]) : '0';
                
                if (!chapters[chNum]) {
                    chapters[chNum] = [];
                }
                chapters[chNum].push(note);
            });
            
            // Sort and display
            Object.keys(chapters).sort((a, b) => parseInt(a) - parseInt(b)).forEach(chNum => {
                const chNotes = chapters[chNum];
                const firstNote = chNotes[0];
                const chTitle = firstNote.title.replace(/^(chapter|ch\.?)\s*\d+[\:\-\s]*/i, '').trim();
                
                const card = document.createElement('div');
                card.className = 'chapter-card';
                
                const header = document.createElement('div');
                header.className = 'chapter-header';
                header.onclick = () => toggleChapter(header);
                header.innerHTML = `
                    <div class="chapter-title">${chNum !== '0' ? `Chapter ${chNum}: ` : ''}${chTitle}</div>
                    <span>▼</span>
                `;
                
                const content = document.createElement('div');
                content.className = 'chapter-content';
                
                const body = document.createElement('div');
                body.className = 'chapter-body';
                
                chNotes.forEach(note => {
                    const link = document.createElement('a');
                    link.className = 'download-link';
                    link.href = note.pdfUrl;
                    link.target = '_blank';
                    link.textContent = `📄 ${note.title}`;
                    body.appendChild(link);
                });
                
                content.appendChild(body);
                card.appendChild(header);
                card.appendChild(content);
                container.appendChild(card);
            });
        }
        
        function toggleChapter(header) {
            const content = header.nextElementSibling;
            content.classList.toggle('expanded');
        }
        
        loadMaterials();
    </script>
</body>
</html>
