<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">PDF Preview – StudyLeem</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="stylesheet" href="/styles.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1372125039445576" crossorigin="anonymous"></script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZNNDTM33RB"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-ZNNDTM33RB');</script>
<style>
body{display:flex;flex-direction:column;min-height:100vh;margin:0;background:#1e1e2e;}
.viewer-bar{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.viewer-back{display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:8px;padding:.45rem 1rem;font-size:.875rem;font-weight:600;white-space:nowrap;text-decoration:none;transition:background .2s;}
.viewer-back:hover{background:rgba(255,255,255,.35);}
.viewer-title{font-size:1rem;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.viewer-actions{display:flex;gap:.5rem;flex-shrink:0;}
.viewer-btn{display:inline-flex;align-items:center;gap:.35rem;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:.45rem .9rem;font-size:.82rem;font-weight:600;text-decoration:none;cursor:pointer;transition:background .2s;}
.viewer-btn:hover{background:rgba(255,255,255,.3);}
.pdf-container{flex:1;position:relative;}
.pdf-iframe{width:100%;height:calc(100vh - 130px);min-height:600px;border:none;display:none;}
.pdf-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#cbd5e1;gap:1rem;font-size:1rem;}
.pdf-spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.1);border-top-color:#2563eb;border-radius:50%;animation:spin 1s linear infinite;}
.pdf-error{display:none;flex-direction:column;align-items:center;justify-content:center;padding:3rem;text-align:center;gap:1rem;color:#f1f5f9;}
.pdf-error h2{font-size:1.5rem;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  .viewer-title{font-size:.85rem;}
  .viewer-btn{font-size:.75rem;padding:.35rem .65rem;}
}
</style>
</head>
<body>
<div class="viewer-bar">
  <a href="#" id="backLink" class="viewer-back">← Back</a>
  <span class="viewer-title" id="docTitle">Loading PDF...</span>
  <div class="viewer-actions">
    <a href="#" id="downloadBtn" class="viewer-btn" target="_blank" rel="noopener">⬇ Download</a>
    <a href="#" id="openTabBtn"  class="viewer-btn" target="_blank" rel="noopener">↗ Open</a>
  </div>
</div>

<ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1372125039445576" data-ad-slot="8190359123" data-ad-format="auto" data-full-width-responsive="true"></ins>
<script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>

<div class="pdf-container" id="pdfContainer">
  <div class="pdf-loading" id="pdfLoading">
    <div class="pdf-spinner"></div>
    <p>Loading PDF, please wait...</p>
    <small style="color:#64748b;">Large files may take a moment</small>
  </div>
  <div class="pdf-error" id="pdfError">
    <div style="font-size:3rem;">📄</div>
    <h2>PDF Not Loading?</h2>
    <p style="color:#94a3b8;">Your browser may be blocking the preview. Try opening directly.</p>
    <a href="#" id="fallbackOpen" target="_blank" rel="noopener" class="viewer-btn" style="font-size:1rem;padding:.75rem 1.5rem;margin-top:1rem;">Open PDF Directly ↗</a>
  </div>
  <iframe id="pdfIframe" class="pdf-iframe" title="PDF Viewer" allowfullscreen></iframe>
</div>

<script>
(function(){
  const p = new URLSearchParams(window.location.search);
  const title   = p.get('title') || 'PDF Preview';
  const rawUrl  = p.get('url')   || '';
  const backUrl = p.get('back')  || '/';

  document.getElementById('pageTitle').textContent = title + ' – StudyLeem';
  document.getElementById('docTitle').textContent  = title;
  document.getElementById('backLink').href         = backUrl;
  document.getElementById('fallbackOpen').href     = rawUrl;
  document.getElementById('openTabBtn').href       = rawUrl;

  // Download URL
  function makeDownload(url) {
    const m = url.match(/\/file\/d\/([^/?]+)/);
    return m ? `https://drive.google.com/uc?export=download&id=${m[1]}` : url;
  }
  // Embed URL
  function makeEmbed(url) {
    const m = url.match(/\/file\/d\/([^/?]+)/);
    if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
    return `https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true`;
  }

  document.getElementById('downloadBtn').href = makeDownload(rawUrl);

  if (!rawUrl) {
    document.getElementById('pdfLoading').style.display = 'none';
    document.getElementById('pdfError').style.display   = 'flex';
    return;
  }

  const iframe  = document.getElementById('pdfIframe');
  const loading = document.getElementById('pdfLoading');
  const errDiv  = document.getElementById('pdfError');

  iframe.src = makeEmbed(rawUrl);

  let timer = setTimeout(() => {
    if (iframe.style.display === 'none') {
      loading.style.display = 'none';
      errDiv.style.display  = 'flex';
    }
  }, 15000);

  iframe.onload = () => {
    clearTimeout(timer);
    loading.style.display = 'none';
    errDiv.style.display  = 'none';
    iframe.style.display  = 'block';
  };
  iframe.onerror = () => {
    clearTimeout(timer);
    loading.style.display = 'none';
    errDiv.style.display  = 'flex';
  };
})();
</script>
<script>window.va=window.va||function(){(window.vaq=window.vaq||[]).push(arguments);};</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
