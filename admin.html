<!DOCTYPE html>
<html lang="en">
<head>
      <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZNNDTM33RB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZNNDTM33RB');
    </script>
    <meta name="google-site-verification" content="E6t2S97guY5wt76RUQY_xrUMGnhvL3iAMk9HXcEHwBs" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - StudyLeem</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <link rel="stylesheet" href="/styles.css">
    <style>
        /* Login Screen Styles */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem;
        }
        
        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo-section h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .logo-section p {
            color: #64748b;
        }
        
        #loginError {
            display: none;
        }
        
        .admin-screen {
            display: none;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .stat-card h3 {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        
        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-container">
            <div class="logo-section">
                <h1>🔐 StudyLeem</h1>
                <p>Admin Panel Login</p>
            </div>
            
            <div id="loginError" class="alert alert-error"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="admin@studyleem.com" 
                        required
                        autocomplete="email"
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Enter your password" 
                        required
                        autocomplete="current-password"
                    >
                </div>
                
                <button type="submit" class="btn-submit" id="loginBtn" style="width: 100%;">
                    Login to Admin Panel
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="/home" style="color: #667eea;">← Back to Home</a>
            </div>
        </div>
    </div>
    
    <!-- ADMIN PANEL SCREEN -->
    <div class="admin-screen" id="adminScreen">
        <div class="admin-container">
            <div class="admin-header">
                <div>
                    <h1>📚 Admin Panel</h1>
                    <p id="userEmail">Loading...</p>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
            
            <div id="alertBox"></div>
            
            <div class="stats">
                <div class="stat-card">
                    <h3>Total Materials</h3>
                    <div class="value" id="totalMaterials">0</div>
                </div>
                <div class="stat-card">
                    <h3>Books</h3>
                    <div class="value" id="totalBooks">0</div>
                </div>
                <div class="stat-card">
                    <h3>Notes</h3>
                    <div class="value" id="totalNotes">0</div>
                </div>
            </div>
            
            <div class="form-section">
                <h2>Add New Material</h2>
                <form id="addForm">
                    <div class="form-group">
                        <label>Type</label>
                        <select id="type" required>
                            <option value="">Select Type</option>
                            <option value="books">Book</option>
                            <option value="notes">Notes</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Class</label>
                        <select id="class" required>
                            <option value="">Select Class</option>
                            <option value="9">Class 9</option>
                            <option value="10">Class 10</option>
                            <option value="11">Class 11</option>
                            <option value="12">Class 12</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" id="subject" placeholder="e.g., Biology" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="title" placeholder="e.g., Chapter 1 Notes" required>
                    </div>
                    
                    <div class="form-group">
                        <label>PDF Link URL</label>
                        <input type="url" id="pdfUrl" placeholder="https://..." required>
                    </div>
                    
                    <button type="submit" class="btn-submit">Add Material</button>
                </form>
            </div>
            
            <div class="materials-table">
                <table>
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Class</th>
                            <th>Subject</th>
                            <th>Title</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="materialsBody">
                        <tr>
                            <td colspan="5" style="text-align: center;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Main JS -->
    <script src="/main.js"></script>
    
    <script>
        // Check authentication
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // User is logged in - show admin panel
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminScreen').style.display = 'block';
                document.getElementById('userEmail').textContent = user.email;
                
                await loadStats();
                await loadMaterials();
            } else {
                // User not logged in - show login screen
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('adminScreen').style.display = 'none';
            }
        });
        
        // Handle login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            const loginBtn = document.getElementById('loginBtn');
            
            errorDiv.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            
            try {
                await auth.signInWithEmailAndPassword(email, password);
                // Will switch screens via onAuthStateChanged
            } catch (error) {
                let message = 'Login failed. Please try again.';
                
                if (error.code === 'auth/user-not-found') {
                    message = 'No account found with this email.';
                } else if (error.code === 'auth/wrong-password') {
                    message = 'Incorrect password.';
                } else if (error.code === 'auth/invalid-email') {
                    message = 'Invalid email address.';
                }
                
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
                
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login to Admin Panel';
            }
        });
        
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                auth.signOut();
            }
        }
        
        function showAlert(message, type = 'success') {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => alertBox.innerHTML = '', 5000);
        }
        
        async function loadStats() {
            try {
                const snapshot = await db.collection('materials').get();
                const materials = snapshot.docs.map(doc => doc.data());
                
                document.getElementById('totalMaterials').textContent = materials.length;
                document.getElementById('totalBooks').textContent = materials.filter(m => m.type === 'books').length;
                document.getElementById('totalNotes').textContent = materials.filter(m => m.type === 'notes').length;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        async function loadMaterials() {
            try {
                const snapshot = await db.collection('materials').orderBy('createdAt', 'desc').get();
                const tbody = document.getElementById('materialsBody');
                
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No materials yet</td></tr>';
                    return;
                }
                
                tbody.innerHTML = '';
                snapshot.docs.forEach(doc => {
                    const data = doc.data();
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${data.type}</td>
                        <td>Class ${data.class}</td>
                        <td>${data.subject}</td>
                        <td>${data.title}</td>
                        <td>
                            <button class="btn-delete" onclick="deleteMaterial('${doc.id}')">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading materials:', error);
                showAlert('Failed to load materials', 'error');
            }
        }
        
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                type: document.getElementById('type').value,
                class: document.getElementById('class').value,
                subject: document.getElementById('subject').value,
                title: document.getElementById('title').value,
                pdfUrl: document.getElementById('pdfUrl').value,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            try {
                await db.collection('materials').add(data);
                showAlert('Material added successfully!');
                e.target.reset();
                await loadStats();
                await loadMaterials();
            } catch (error) {
                console.error('Error adding material:', error);
                showAlert('Failed to add material: ' + error.message, 'error');
            }
        });
        
        async function deleteMaterial(id) {
            if (!confirm('Are you sure you want to delete this material?')) return;
            
            try {
                await db.collection('materials').doc(id).delete();
                showAlert('Material deleted successfully!');
                await loadStats();
                await loadMaterials();
            } catch (error) {
                console.error('Error deleting material:', error);
                showAlert('Failed to delete material: ' + error.message, 'error');
            }
        }
    </script>
</body>
</html>
