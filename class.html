<body>
    <div class="header">
        <div class="container">
            <div class="breadcrumb">
                <a href="/home">Home</a> / Class <span id="classNum">12</span>
            </div>
            <h1>📚 Class <span id="classTitle">12</span></h1>
            <p>Federal Board (FBISE) - All Subjects</p>
        </div>
    </div>
    
    <div class="loading" id="loading">Loading subjects...</div>
    
    <div class="subjects-grid" id="subjectsGrid" style="display: none;"></div>
    
    <div class="footer">
        <p>&copy; 2026 StudyLeem. All rights reserved.</p>
        <p style="margin-top: 0.5rem;">
            <a href="/privacy" style="color: #94a3b8; margin: 0 0.5rem;">Privacy</a> |
            <a href="/terms" style="color: #94a3b8; margin: 0 0.5rem;">Terms</a> |
            <a href="/about" style="color: #94a3b8; margin: 0 0.5rem;">About</a> |
            <a href="/contact" style="color: #94a3b8; margin: 0 0.5rem;">Contact</a>
        </p>
    </div>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Main JS -->
    <script src="/main.js"></script>
    
    <script>
        // Get class from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const classNum = urlParams.get('class') || '12';
        
        document.getElementById('classNum').textContent = classNum;
        document.getElementById('classTitle').textContent = classNum;
        document.title = `Class ${classNum} - FBISE | StudyLeem`;
        
        // Load subjects from Firebase
        async function loadSubjects() {
            try {
                const snapshot = await db.collection('materials')
                    .where('class', '==', classNum)
                    .get();
                
                const subjects = {};
                snapshot.docs.forEach(doc => {
                    const data = doc.data();
                    if (!subjects[data.subject]) {
                        subjects[data.subject] = {
                            books: 0,
                            notes: 0
                        };
                    }
                    if (data.type === 'books') subjects[data.subject].books++;
                    if (data.type === 'notes') subjects[data.subject].notes++;
                });
                
                const grid = document.getElementById('subjectsGrid');
                grid.innerHTML = '';
                
                if (Object.keys(subjects).length === 0) {
                    grid.innerHTML = '<p style="text-align: center; padding: 2rem; color: #64748b;">No subjects available yet for Class ' + classNum + '</p>';
                    grid.style.display = 'block';
                    document.getElementById('loading').style.display = 'none';
                    return;
                }
                
                Object.keys(subjects).sort().forEach(subject => {
                    const card = document.createElement('a');
                    card.className = 'subject-card';
                    card.href = `/subject?class=${classNum}&subject=${encodeURIComponent(subject)}`;
                    
                    const icon = getSubjectIcon(subject);
                    
                    card.innerHTML = `
                        <div class="subject-header">${icon} ${subject}</div>
                        <div class="subject-body">
                            <p>Complete study materials for ${subject}</p>
                            <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                                ${subjects[subject].books > 0 ? '<span class="badge badge-primary">📚 Books</span>' : ''}
                                ${subjects[subject].notes > 0 ? '<span class="badge badge-success">📝 Notes</span>' : ''}
                            </div>
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });
                
                document.getElementById('loading').style.display = 'none';
                grid.style.display = 'grid';
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').textContent = 'Error loading subjects';
            }
        }
        
        function getSubjectIcon(subject) {
            const icons = {
                'Biology': '🧬',
                'Chemistry': '🧪',
                'Physics': '⚛️',
                'Mathematics': '🔢',
                'Computer Science': '💻',
                'English': '📖',
                'Urdu': '📝',
                'Islamiat': '☪️',
                'Pakistan Studies': '🇵🇰'
            };
            return icons[subject] || '📚';
        }
        
        // Add badge styles
        const badgeStyle = document.createElement('style');
        badgeStyle.textContent = `
            .badge {
                display: inline-flex;
                align-items: center;
                padding: 0.25rem 0.75rem;
                font-size: 0.75rem;
                font-weight: 600;
                border-radius: 12px;
            }
            .badge-primary {
                background: #e0e7ff;
                color: #4f46e5;
            }
            .badge-success {
                background: #d1fae5;
                color: #059669;
            }
        `;
        document.head.appendChild(badgeStyle);
        
        loadSubjects();
    </script>
</body>
</html>
