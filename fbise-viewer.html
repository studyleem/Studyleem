<style>
body{display:flex;flex-direction:column;min-height:100vh;margin:0;}
.viewer-wrap{flex:1;display:flex;flex-direction:column;background:#1e1e2e;}
.viewer-bar{background:linear-gradient(135deg,var(--primary,#2563eb),#1d4ed8);color:#fff;padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.viewer-back{display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:8px;padding:.45rem 1rem;font-size:.875rem;font-weight:600;text-decoration:none;white-space:nowrap;transition:background .2s;flex-shrink:0;}
.viewer-back:hover{background:rgba(255,255,255,.35);}
.viewer-title{font-size:1rem;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.viewer-actions{display:flex;gap:.5rem;flex-shrink:0;}
.viewer-btn{display:inline-flex;align-items:center;gap:.35rem;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:.45rem .9rem;font-size:.82rem;font-weight:600;text-decoration:none;cursor:pointer;transition:background .2s;}
.viewer-btn:hover{background:rgba(255,255,255,.3);}
.pdf-container{flex:1;position:relative;min-height:calc(100vh - 120px);}
.pdf-iframe{width:100%;height:100%;min-height:calc(100vh - 120px);border:none;display:block;}
.pdf-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1e1e2e;color:#cbd5e1;gap:1rem;font-size:1rem;}
.pdf-spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.1);border-top-color:#2563eb;border-radius:50%;animation:spin 1s linear infinite;}
.pdf-error{display:none;flex-direction:column;align-items:center;justify-content:center;padding:3rem;text-align:center;gap:1rem;color:#f1f5f9;}
.pdf-error h2{font-size:1.5rem;margin:0;}
.pdf-error p{color:#94a3b8;margin:0;}
.pdf-error a{color:#60a5fa;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  .viewer-title{font-size:.875rem;}
  .viewer-actions{gap:.35rem;}
  .viewer-btn{font-size:.75rem;padding:.35rem .65rem;}
}
</style>
